checkpoint: 0
model_type: ARIMA
model_id: ARIMA_v1
models_path: models/toy_models
pipeline:
  etl:
  - class: machinelearning.modules.time_series.yahoo_finance_etl.YahooFinanceETL
    params:
      ticker: AAPL
      period: 5y
      dataset_name: toy_models_yahoo
      data_path: data
  dataset_loader:
    class: eigenframework.modules.machine_learning.transforms.dataset_loader.DatasetLoader
    params:
      data_path: data
      dataset_name: toy_models_yahoo
      load_mmf: false
  xy_split:
    class: machinelearning.modules.time_series.time_series_xy_split.TimeSeriesXYSplit
    params:
      target_column: Close
      forecast_horizon: 1
  spp:
  - class: machinelearning.modules.time_series.time_series_feature_engineering.TimeSeriesFeatureEngineering
    params:
      features:
      - sma_20
      - sma_50
      - ema_12
      - rsi_14
      - macd
      - volatility_20
      - returns_1d
      - day_of_week
  validation_split:
    class: machinelearning.modules.time_series.temporal_validation_split.TemporalValidationSplit
    params:
      train_size: 0.7
      val_size: 0.15
      test_size: 0.15
  dpp:
  - class: eigenframework.modules.machine_learning.transforms.identity.Identity
    params: {}
  model:
    class: machinelearning.modules.time_series.arima_model.ARIMAModel
    params:
      order:
      - 5
      - 1
      - 2
      seasonal_order:
      - 0
      - 0
      - 0
      - 0
      target_column: Close
  pos:
  - class: eigenframework.modules.machine_learning.transforms.identity.Identity
    params: {}
  metrics:
    class: eigenframework.modules.machine_learning.metrics.metrics_classification_regression.MetricsClassificationRegression
    params:
      mode: regression
  model_loader:
    class: eigenframework.modules.machine_learning.loaders.basic_model_loader.BasicModelLoader
    params: {}
  logger:
    class: eigenframework.modules.machine_learning.utils.wandb_logging.WandbLogging
    params:
      project_name: toy_models
      run_name: ARIMA_v1
tuning:
  n_trials: 30
  metric: mean_absolute_error
  direction: minimize
  params:
    pipeline.model.params.order[0]:
      type: int
      low: 1
      high: 10
    pipeline.model.params.order[2]:
      type: int
      low: 0
      high: 5
    pipeline.model.params.seasonal_order[0]:
      type: int
      low: 0
      high: 2
    pipeline.model.params.seasonal_order[2]:
      type: int
      low: 0
      high: 2
